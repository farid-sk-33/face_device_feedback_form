<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Recognition Device - Feedback Portal</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --star-active: #fbbf24;
            --star-dim: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo {
            max-width: 120px;
            height: auto;
            margin-bottom: 1rem;
        }

        header h1 {
            color: var(--primary);
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-light);
        }

        .form-group {
            margin-bottom: 1.8rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .helper-text {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 0.5rem;
            display: block;
        }

        input[type="text"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #fff;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .rating-container {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.25rem;
        }

        .star {
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--star-dim);
            transition: color 0.2s ease;
        }

        .star.active, .star:hover {
            color: var(--star-active);
        }

        .radio-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .radio-label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        input[type="radio"] {
            display: none;
        }

        input[type="radio"]:checked + .radio-label {
            background-color: rgba(37, 99, 235, 0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        button {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 1rem;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .success-message {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .success-message h2 {
            color: #10b981;
            margin-bottom: 0.5rem;
        }

        .error-message {
            display: none;
            text-align: center;
            padding: 1rem;
            margin-top: 1rem;
            background: #fef2f2;
            border-radius: 8px;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="formContainer">
        <header>
            <!-- REPLACE WITH YOUR LOGO URL -->
            <img src="smarti.png" alt="Smart-I Logo" class="logo">
            <h1>Device Feedback</h1>
            <p>Help us improve your face recognition device experience</p>
        </header>

        <form id="feedbackForm">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" required placeholder="John Doe">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="john@example.com">
            </div>

            <div class="form-group">
                <label>Overall Experience</label>
                <span class="helper-text">Rate your general satisfaction with the face recognition device.</span>
                <div class="rating-container" id="starRating">
                    <span class="star" data-value="1">&#9733;</span>
                    <span class="star" data-value="2">&#9733;</span>
                    <span class="star" data-value="3">&#9733;</span>
                    <span class="star" data-value="4">&#9733;</span>
                    <span class="star" data-value="5">&#9733;</span>
                </div>
                <input type="hidden" id="ratingValue" name="rating" required>
            </div>

            <div class="form-group">
                <label>How would you rate the recognition speed?</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="speed" value="Excellent" required>
                        <span class="radio-label">Excellent</span>
                    </label>
                    <label>
                        <input type="radio" name="speed" value="Good">
                        <span class="radio-label">Good</span>
                    </label>
                    <label>
                        <input type="radio" name="speed" value="Average">
                        <span class="radio-label">Average</span>
                    </label>
                    <label>
                        <input type="radio" name="speed" value="Poor">
                        <span class="radio-label">Poor</span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="lighting">Performance in low-light environments</label>
                <select id="lighting" required>
                    <option value="" disabled selected>Select an option</option>
                    <option value="perfect">Works perfectly without issues</option>
                    <option value="minor-delay">Works, but experiences minor delays</option>
                    <option value="fails-often">Frequently fails to recognize my face</option>
                    <option value="not-tested">Have not tested in low light</option>
                </select>
            </div>

            <div class="form-group">
                <label for="comments">What can we improve? (Bugs, features, UI/UX)</label>
                <textarea id="comments" rows="4" placeholder="Share your experience or report an issue..."></textarea>
            </div>

            <button type="submit" id="submitBtn">Submit Feedback</button>
            <div id="errorDisplay" class="error-message"></div>
        </form>
    </div>

    <div id="successContainer" class="success-message">
        <h2>✓ Thank You!</h2>
        <p>Your feedback has been successfully captured. We appreciate your input to help us refine our face recognition algorithms and hardware.</p>
    </div>
</div>

<script>
    // ============ CONFIGURATION ============
    // 🔥 IMPORTANT: Replace this URL with YOUR Google Apps Script Web App URL
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwrrFGmdQDmZud4thtMfNVx0Kb3zn5IChV4Hk9wYxYiZFs3JR70vAd27vBW0YCFkz4v/exec';
    // ======================================

    // --- Star Rating Logic ---
    const stars = document.querySelectorAll('.star');
    const ratingValueInput = document.getElementById('ratingValue');

    stars.forEach(star => {
        star.addEventListener('click', () => {
            const value = parseInt(star.getAttribute('data-value'));
            ratingValueInput.value = value;
            
            stars.forEach(s => {
                const starValue = parseInt(s.getAttribute('data-value'));
                if (starValue <= value) {
                    s.classList.add('active');
                } else {
                    s.classList.remove('active');
                }
            });
        });
    });

    // --- Form Submission Handler ---
    const form = document.getElementById('feedbackForm');
    const submitBtn = document.getElementById('submitBtn');
    const errorDisplay = document.getElementById('errorDisplay');
    const formContainer = document.getElementById('formContainer');
    const successContainer = document.getElementById('successContainer');

    form.addEventListener('submit', async function(e) {
        e.preventDefault();

        // Validate star rating
        if (!ratingValueInput.value) {
            showError('Please select an overall experience star rating.');
            return;
        }

        // Get selected speed radio value
        const speedRadio = document.querySelector('input[name="speed"]:checked');
        if (!speedRadio) {
            showError('Please rate the recognition speed.');
            return;
        }

        // Build data payload
        const payload = {
            name: document.getElementById('fullName').value.trim(),
            email: document.getElementById('email').value.trim(),
            rating: ratingValueInput.value,
            speed: speedRadio.value,
            lowLight: document.getElementById('lighting').value,
            comments: document.getElementById('comments').value.trim()
        };

        // Disable button and show loading state
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner"></span> Submitting...';
        errorDisplay.style.display = 'none';

        try {
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',  // Required for Apps Script Web App
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(payload)
            });

            // With no-cors, response is opaque, but we can still check if it succeeded
            // The Apps Script will still process the data even if we can't read the response
            console.log('Feedback submitted:', payload);
            
            // Show success
            formContainer.style.display = 'none';
            successContainer.style.display = 'block';

        } catch (error) {
            console.error('Submission error:', error);
            showError('Something went wrong. Please try again or contact support.');
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Submit Feedback';
        }
    });

    // --- Helper Functions ---
    function showError(message) {
        errorDisplay.textContent = message;
        errorDisplay.style.display = 'block';
        // Auto-hide after 5 seconds
        setTimeout(() => {
            errorDisplay.style.display = 'none';
        }, 5000);
    }
</script>

</body>
</html>
